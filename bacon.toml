#:schema https://dystroy.org/bacon/.bacon.schema.json

default_job = "clippy"
env.CARGO_TERM_COLOR = "always"

[jobs.check]
command = ["cargo", "check"]
on_change_strategy = "kill_then_restart"
need_stdout = false

[jobs.clippy]
command = ["cargo", "clippy"]
on_change_strategy = "kill_then_restart"
need_stdout = false

[jobs.test]
command = ["cargo", "test"]
on_change_strategy = "kill_then_restart"
need_stdout = true

[jobs.doc-open]
command = ["cargo", "doc", "--no-deps", "--open"]
need_stdout = false
on_success = "back"

[jobs.run]
command = ["cargo", "run", "test.euph"]
on_change_strategy = "kill_then_restart"
need_stdout = true
allow_warnings = true

[keybindings]
Shift-c = "job:check"
c = "job:clippy"
t = "job:test"
d = "job:doc-open"
r = "job:run"
